<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inventory Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center mb-4">Inventory Dashboard</h1>

    <!-- ADD PRODUCT -->
    <div class="card p-3 mb-4">
        <h4>Add Product</h4>
        <div class="row">
            <div class="col"><input id="name" class="form-control" placeholder="Name"></div>
            <div class="col"><input id="price" class="form-control" placeholder="Price"></div>
            <div class="col"><input id="quantity" class="form-control" placeholder="Quantity"></div>
            <div class="col"><input id="supplierId" class="form-control" placeholder="Supplier ID"></div>
            <div class="col"><button class="btn btn-success" onclick="addProduct()">Add</button></div>
        </div>
    </div>

    <!-- SALES -->
    <div class="card p-3 mb-4">
        <h4>Make Sale</h4>
        <div class="row">
            <div class="col"><input id="saleProductId" class="form-control" placeholder="Product ID"></div>
            <div class="col"><input id="saleQty" class="form-control" placeholder="Quantity"></div>
            <div class="col"><button class="btn btn-danger" onclick="makeSale()">Sell</button></div>
        </div>
    </div>

    <!-- PURCHASE -->
    <div class="card p-3 mb-4">
        <h4>Purchase Stock</h4>
        <div class="row">
            <div class="col"><input id="purchaseProductId" class="form-control" placeholder="Product ID"></div>
            <div class="col"><input id="purchaseQty" class="form-control" placeholder="Quantity"></div>
            <div class="col"><button class="btn btn-primary" onclick="makePurchase()">Purchase</button></div>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="card p-3 mb-4">
        <h4>Products</h4>
        <button class="btn btn-secondary mb-2" onclick="loadProducts()">Refresh</button>
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Product ID</th>
                <th>Name</th>
                <th>Supplier ID</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="productTable"></tbody>
        </table>
    </div>

    <!-- LOW STOCK -->
    <div class="card p-3 mb-4">
        <h4>Low Stock</h4>
        <button class="btn btn-warning mb-2" onclick="loadLowStock()">Check</button>
        <ul id="lowStockList"></ul>
    </div>

    <!-- CHART -->
    <div class="card p-3">
        <h4>Stock Chart</h4>
        <canvas id="stockChart"></canvas>
    </div>

</div>

<!-- JS FILES -->
<script src="js/api.js"></script>
<script src="js/product.js"></script>
<script src="js/sales.js"></script>
<script src="js/purchase.js"></script>
<script src="js/chart.js"></script>

</body>
</html>
